<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Menu</title>
    <script src="demo-navbar.js" defer></script>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: url(./photolab4.jpg) no-repeat center center/cover;
                overflow: hidden;
        }
        .navbar{
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 80px;
            position: sticky;
            top: 0;
            background: transparent;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 999;
        }
        .navbar-container{
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 2rem;
            max-width: 1600px;
        }
        .navbar-logo{
            font-size: 2rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
        }
        .navbar-container .navbar-menu{
            display: flex;
            list-style: none;
            text-align: center;
            gap: 1.5rem;

        }
        .navbar-container .navbar-menu li a{
            text-decoration: none;
            color: #fff;
            font-size: 1.3rem;
            font-weight: 500;
            padding: 2px 20px;
            border-radius: 20px;
            border: 2px solid transparent;
            transition: all 0.7s ease;
            white-space: nowrap;
        }
        .navbar-container .navbar-menu li a:hover, .navbar-container .navbar-menu li a.active{
            color: #262530;
            background: rgba(188, 212, 229, 0.8);
            border: 2px solid #fff;
        }
        .navbar-toggle{
            display: none;
            background: transparent;
            padding: 10px;
            border: none;
            cursor: pointer;
        }
        .bar{
            display: block;
            width: 25px;
            height: 3px;
            margin: 5px auto;
            background-color: #fff;
            transition: all 0.5s ease-in-out;
        }
        @media (max-width: 880px) {
            .navbar{
                backdrop-filter: none;
            }
            .navbar-container .navbar-menu{
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 1.7rem !important;
                position: absolute;
                height: 100vh;
                width: 250px;
                top: 0;
                right: -100%;
                padding: 5rem 1.5rem;
                box-shadow: 1 10px 10px rgba(0, 0, 0, 0.5);
                backdrop-filter: blur(10px);
                transition: right 500ms ease-out;
            }
            .navbar-container .navbar-menu.active{
                display: flex;
                right: 0;
            }
            .navbar-toggle{
                display: block;
                z-index: 999;
            }
            .navbar-toggle.active .bar:nth-child(2){
                opacity: 0;
            }
            .navbar-toggle.active .bar:nth-child(1){
                transform: translateY(8px) rotate(45deg);
            }
            .navbar-toggle.active .bar:nth-child(3){
                transform: translateY(-8px) rotate(-45deg);
            }
        }
        @media (max-width: 480px) {
            .navbar-container{
                padding: 0 1rem;
            }
            .navbar-logo{
                font-size: 1.7rem;
            }
            .navbar-container .navbar-menu li a{
                font-size: 1.2rem;
                padding: 3px 15px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">Stonez</a>
            <button class="navbar-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <ul class="navbar-menu">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Pricing</a></li>
                <li><a href="#">Features</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
        </div>
    </nav>
    <main>

    </main>
</body>
</html>
